services:
  - type: static
    name: glowauraskin-web
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://glowaura-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
