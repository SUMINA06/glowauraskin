services:
  - type: web
    name: glowaura-app
    buildCommand: npm install --prefix backend && npm install --prefix frontend-react && npm run build --prefix frontend-react
    startCommand: node backend/server.js
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        sync: false
      - key: VITE_API_BASE_URL
        value: /api
