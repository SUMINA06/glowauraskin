services:
  - type: static
    name: glowauraskin-web
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://glowaura-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: glowaura-api
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        sync: false
